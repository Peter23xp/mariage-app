<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administration - Gestion des invités</title>
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <main class="admin-screen">
    
    <!-- HEADER ADMINISTRATION -->
    <header class="admin-header">
      <h1>Gestion des invités</h1>
      <nav class="header-actions">
        <a href="/index.html" id="btn-back-to-scan" class="btn btn-secondary">
          ← Retour au scan
        </a>
      </nav>
    </header>
    
    <!-- STATISTIQUES (4 CARTES) -->
    <section class="stats-grid">
      <div class="stat-card">
        <span id="stat-total" class="stat-value">0</span>
        <span class="stat-label">Total invités</span>
      </div>
      <div class="stat-card">
        <span id="stat-entered" class="stat-value">0</span>
        <span class="stat-label">Déjà entrés</span>
      </div>
      <div class="stat-card">
        <span id="stat-waiting" class="stat-value">0</span>
        <span class="stat-label">En attente</span>
      </div>
      <div class="stat-card">
        <span id="stat-rate" class="stat-value">0%</span>
        <span class="stat-label">Taux d'entrée</span>
      </div>
    </section>
    
    <!-- BARRE D'ACTIONS -->
    <section class="actions-bar">
      <div class="search-group">
        <input 
          id="search-input" 
          type="search" 
          placeholder="Rechercher un invité par nom ou code..."
          aria-label="Rechercher un invité"
        >
      </div>
      <div class="action-buttons">
        <button id="btn-add-invite" class="btn btn-gold">
          + Ajouter un invité
        </button>
        <button id="btn-import-csv" class="btn btn-secondary">
          📥 Importer CSV
        </button>
        <button id="btn-export-csv" class="btn btn-secondary">
          📤 Exporter CSV
        </button>
      </div>
    </section>
    
    <!-- TABLEAU DES INVITÉS -->
    <section class="table-container">
      <table id="invites-table">
        <thead>
          <tr>
            <th>Code QR</th>
            <th>Nom de l'invité</th>
            <th>Couple</th>
            <th>Table</th>
            <th>Statut</th>
            <th>Date scan</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="invites-tbody">
          <!-- HOOK : Rempli dynamiquement par admin.js (Étape 6) -->
          <tr class="empty-state">
            <td colspan="7">
              <div class="empty-message">
                <p>Aucun invité pour le moment</p>
                <p class="empty-hint">Cliquez sur "Ajouter un invité" pour commencer</p>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </section>
    
    <!-- MODAL AJOUTER INVITÉ (caché par défaut) -->
    <div id="modal-add-invite" class="modal hidden">
      <div class="modal-content">
        <header class="modal-header">
          <h2>Ajouter un invité</h2>
          <button id="btn-close-modal" class="btn-close" aria-label="Fermer la modal">
            ✕
          </button>
        </header>
        
        <form id="form-add-invite">
          <div class="input-group">
            <label for="input-nom">Nom de l'invité</label>
            <input 
              id="input-nom" 
              name="nom_invite" 
              type="text" 
              required 
              placeholder="Ex: Jean Dupont"
              autocomplete="name"
            >
          </div>
          
          <div class="input-group">
            <label for="input-couple">Nom du couple marié</label>
            <input 
              id="input-couple" 
              name="couple_nom" 
              type="text" 
              required 
              placeholder="Ex: Sarah & Thomas"
            >
          </div>
          
          <div class="input-group">
            <label for="input-table">Numéro de table (optionnel)</label>
            <input 
              id="input-table" 
              name="table_numero" 
              type="text" 
              placeholder="Ex: 5"
            >
          </div>
          
          <!-- Zone de prévisualisation du QR code généré -->
          <div id="qr-preview" class="qr-preview hidden">
            <!-- HOOK : QR code ajouté dynamiquement par admin.js -->
            <p class="qr-label">QR Code généré :</p>
            <img id="qr-image" src="" alt="QR Code généré">
            <p id="qr-code-text" class="qr-code-text"></p>
          </div>
          
          <button type="submit" class="btn btn-gold">
            Générer & Ajouter
          </button>
        </form>
      </div>
    </div>
    
    <!-- INPUT FILE CACHÉ POUR IMPORT CSV -->
    <input 
      id="csv-input" 
      type="file" 
      accept=".csv,.xlsx" 
      hidden 
      aria-label="Fichier CSV à importer"
    >
    
  </main>
  
  <!-- Scripts JS (logique implémentée à l'Étape 6) -->
  <script src="/js/api.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
